<!D html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Premium Habit Tracker - Build better habits with AI-powered insights, gamification, and focus tools">
  <meta name="theme-color" content="#10B981">
  <title>Nexus Habit | Premium Productivity Suite</title>
  
  <!-- Preconnect to CDNs -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://cdnjs.cloudflare.com">
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  
  <!-- React & ReactDOM -->
  <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.development.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.development.js"></script>
  
  <!-- Framer Motion -->
  <script src="https://cdn.jsdelivr.net/npm/framer-motion@10.16.4/dist/framer-motion.js"></script>
  
  <!-- Babel for JSX -->
  <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
  
  <!-- Canvas Confetti -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1"></script>
  
  <style>
    * {
      font-family: 'Inter', sans-serif;
    }
    
    body {
      background: radial-gradient(circle at 20% 30%, #0A0A0A, #030303);
      min-height: 100vh;
      margin: 0;
      padding: 0;
    }
    
    /* Custom scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    
    ::-webkit-scrollbar-track {
      background: #1a1a1a;
    }
    
    ::-webkit-scrollbar-thumb {
      background: #10B981;
      border-radius: 10px;
    }
    
    ::-webkit-scrollbar-thumb:hover {
      background: #059669;
    }
    
    /* Glass morphism effect */
    .glass-premium {
      background: rgba(18, 18, 24, 0.6);
      backdrop-filter: blur(14px);
      border: 1px solid rgba(16, 185, 129, 0.2);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }
    
    /* Glow effects */
    .glow-green {
      box-shadow: 0 0 18px rgba(16, 185, 129, 0.4);
      transition: all 0.3s ease;
    }
    
    .glow-green:hover {
      box-shadow: 0 0 28px rgba(16, 185, 129, 0.7);
    }
    
    /* Animated gradient progress bar */
    .neon-progress {
      background: linear-gradient(90deg, #10B981, #34D399, #059669);
      background-size: 200% auto;
      animation: shimmer 2s linear infinite;
    }
    
    @keyframes shimmer {
      0% { background-position: 0% 0; }
      100% { background-position: 200% 0; }
    }
    
    /* Floating background elements */
    .floating-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }
    
    .floating-bg div {
      position: absolute;
      background: radial-gradient(circle, rgba(16, 185, 129, 0.15) 0%, rgba(0, 0, 0, 0) 70%);
      border-radius: 50%;
      filter: blur(60px);
      animation: float 20s infinite;
    }
    
    @keyframes float {
      0% { transform: translateY(0px) scale(1); }
      50% { transform: translateY(-30px) scale(1.1); }
      100% { transform: translateY(0px) scale(1); }
    }
    
    /* Smooth transitions */
    button, a, .habit-card {
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    /* Loading animation */
    .loading-spinner {
      width: 50px;
      height: 50px;
      border: 3px solid rgba(16, 185, 129, 0.3);
      border-radius: 50%;
      border-top-color: #10B981;
      animation: spin 1s ease-in-out infinite;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    /* Responsive adjustments */
    @media (max-width: 768px) {
      .glass-premium {
        backdrop-filter: blur(10px);
      }
    }
    
    /* Heatmap grid */
    .grid-cols-15 {
      grid-template-columns: repeat(15, minmax(0, 1fr));
    }
    
    /* Custom focus ring */
    *:focus {
      outline: none;
      ring: 2px solid #10B981;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  
  <script type="text/babel" data-presets="react">
    // ============================================
    // NEXUS HABIT - Premium Habit Tracker
    // Production-Ready React Application
    // ============================================
    
    const { useState, useEffect, useRef, useCallback, createContext, useContext } = React;
    const { motion, AnimatePresence } = window.framerMotion;
    const canvasConfetti = window.canvasConfetti;
    
    // ========== UTILITY FUNCTIONS ==========
    const getTodayKey = () => new Date().toISOString().slice(0, 10);
    
    const getDaysArray = (days = 90) => {
      let arr = [];
      for (let i = days; i >= 0; i--) {
        let d = new Date();
        d.setDate(d.getDate() - i);
        arr.push(d.toISOString().slice(0, 10));
      }
      return arr;
    };
    
    // XP & Level System
    const getLevelFromXP = (xp) => {
      if (xp < 200) return { name: 'Beginner', level: 1, next: 200, icon: '🌱' };
      if (xp < 600) return { name: 'Consistent', level: 2, next: 600, icon: '📈' };
      if (xp < 1500) return { name: 'Disciplined', level: 3, next: 1500, icon: '⚡' };
      if (xp < 3500) return { name: 'Elite', level: 4, next: 3500, icon: '🏆' };
      return { name: 'Master', level: 5, next: null, icon: '👑' };
    };
    
    // Compute streak from history
    const computeStreak = (history) => {
      let streak = 0;
      let check = new Date();
      while (true) {
        const d = check.toISOString().slice(0, 10);
        if (history[d] === true) streak++;
        else if (history[d] === false && d === getTodayKey()) break;
        else if (!history[d] && d !== getTodayKey()) break;
        else if (history[d] === false) break;
        check.setDate(check.getDate() - 1);
        if (streak > 500) break;
      }
      return streak;
    };
    
    const getBestStreak = (habit) => {
      let curr = 0, best = 0;
      Object.keys(habit.history).sort().forEach(d => {
        if (habit.history[d]) {
          curr++;
          best = Math.max(best, curr);
        } else {
          curr = 0;
        }
      });
      return best;
    };
    
    // AI Insights Generator
    const generateAIInsight = (habits) => {
      const completedToday = habits.filter(h => h.history[getTodayKey()] === true).length;
      const total = habits.length;
      if (total === 0) return "✨ Add your first habit to unlock AI coaching!";
      if (completedToday === total && total > 0) return "🔥 Perfect day! Consistency compounds — you're in the top 10% of users.";
      if (completedToday === 0) return "🌱 Every master was once a beginner. Start with one small action today.";
      const avgStreak = habits.reduce((sum, h) => sum + computeStreak(h.history), 0) / total;
      if (avgStreak > 5) return `🎯 Amazing! Your average streak is ${avgStreak.toFixed(1)} days. You're building unshakeable discipline.`;
      return `📊 Your success rate is ${Math.round((completedToday / total) * 100)}%. Keep the momentum!`;
    };
    
    // ========== MAIN APP COMPONENT ==========
    const App = () => {
      // State Management with LocalStorage
      const [habits, setHabits] = useState(() => {
        const saved = localStorage.getItem('nexus_habits');
        if (saved) return JSON.parse(saved);
        return [
          { 
            id: 'h1', 
            name: 'Morning Meditation', 
            category: 'Spiritual', 
            priority: 'High', 
            icon: '🧘', 
            target: 1, 
            unit: 'session', 
            notes: 'Start day with clarity', 
            schedule: 'daily', 
            history: { 
              [getTodayKey()]: true,
              [new Date(Date.now() - 86400000).toISOString().slice(0, 10)]: true 
            },
            createdAt: new Date().toISOString()
          },
          { 
            id: 'h2', 
            name: 'Read 30 Mins', 
            category: 'Study', 
            priority: 'Medium', 
            icon: '📖', 
            target: 1, 
            unit: 'session', 
            notes: 'Deep work session', 
            schedule: 'daily', 
            history: { [getTodayKey()]: false },
            createdAt: new Date().toISOString()
          },
          { 
            id: 'h3', 
            name: 'Workout', 
            category: 'Fitness', 
            priority: 'High', 
            icon: '💪', 
            target: 1, 
            unit: 'workout', 
            notes: '30 mins cardio', 
            schedule: 'daily', 
            history: { [getTodayKey()]: true },
            createdAt: new Date().toISOString()
          },
          { 
            id: 'h4', 
            name: 'Journal', 
            category: 'Productivity', 
            priority: 'Medium', 
            icon: '✍️', 
            target: 1, 
            unit: 'entry', 
            notes: 'Reflect on achievements', 
            schedule: 'daily', 
            history: { [getTodayKey()]: false },
            createdAt: new Date().toISOString()
          }
        ];
      });
      
      const [xp, setXp] = useState(() => parseInt(localStorage.getItem('nexus_xp') || '0'));
      const [pomodoroSessions, setPomodoroSessions] = useState(() => parseInt(localStorage.getItem('nexus_pomo') || '0'));
      const [activeSidebar, setActiveSidebar] = useState('Dashboard');
      const [searchTerm, setSearchTerm] = useState('');
      const [filterCategory, setFilterCategory] = useState('All');
      const [notificationsEnabled, setNotificationsEnabled] = useState(true);
      const [soundEnabled, setSoundEnabled] = useState(true);
      
      // Persist data
      useEffect(() => {
        localStorage.setItem('nexus_habits', JSON.stringify(habits));
      }, [habits]);
      
      useEffect(() => {
        localStorage.setItem('nexus_xp', xp);
      }, [xp]);
      
      useEffect(() => {
        localStorage.setItem('nexus_pomo', pomodoroSessions);
      }, [pomodoroSessions]);
      
      // Habit CRUD Operations
      const completeHabit = (id) => {
        setHabits(prev => prev.map(h => {
          if (h.id === id && !h.history[getTodayKey()]) {
            const newHistory = { ...h.history, [getTodayKey()]: true };
            const xpGain = 10 + (h.priority === 'High' ? 5 : h.priority === 'Medium' ? 3 : 1);
            setXp(old => old + xpGain);
            
            // Check for milestone
            const newStreak = computeStreak(newHistory);
            if (newStreak === 7 || newStreak === 30 || newStreak === 100) {
              canvasConfetti({
                particleCount: 150,
                spread: 70,
                origin: { y: 0.6 },
                colors: ['#10B981', '#34D399', '#059669']
              });
              
              if (notificationsEnabled && Notification.permission === 'granted') {
                new Notification(`🎉 ${newStreak} Day Streak!`, {
                  body: `Amazing consistency on ${h.name}! Keep going!`
                });
              }
            }
            
            return { ...h, history: newHistory };
          }
          return h;
        }));
      };
      
      const addHabit = (habit) => {
        setHabits(prev => [...prev, {
          ...habit,
          id: Date.now().toString(),
          history: {},
          createdAt: new Date().toISOString()
        }]);
      };
      
      const deleteHabit = (id) => {
        if (window.confirm('Delete this habit? Progress will be lost.')) {
          setHabits(prev => prev.filter(h => h.id !== id));
        }
      };
      
      const updateHabit = (id, updates) => {
        setHabits(prev => prev.map(h => h.id === id ? { ...h, ...updates } : h));
      };
      
      // Filtered habits
      const filteredHabits = habits.filter(h => 
        h.name.toLowerCase().includes(searchTerm.toLowerCase()) &&
        (filterCategory === 'All' || h.category === filterCategory)
      );
      
      // Analytics data
      const heatmapData = getDaysArray(90).map(date => ({
        date,
        count: habits.filter(h => h.history[date] === true).length
      }));
      
      const completionRate = habits.length 
        ? (habits.filter(h => h.history[getTodayKey()] === true).length / habits.length) * 100 
        : 0;
      
      const levelInfo = getLevelFromXP(xp);
      const aiMessage = generateAIInsight(habits);
      const bestStreakOverall = Math.max(...habits.map(h => getBestStreak(h)), 0);
      
      // Request notification permission
      useEffect(() => {
        if (notificationsEnabled && Notification.permission === 'default') {
          Notification.requestPermission();
        }
      }, [notificationsEnabled]);
      
      // Navigation items
      const navItems = [
        { id: 'Dashboard', icon: 'fa-chart-line', label: 'Dashboard' },
        { id: 'Habits', icon: 'fa-check-circle', label: 'Habits' },
        { id: 'Analytics', icon: 'fa-chart-simple', label: 'Analytics' },
        { id: 'Focus Mode', icon: 'fa-clock', label: 'Focus' },
        { id: 'Achievements', icon: 'fa-award', label: 'Achievements' },
        { id: 'Settings', icon: 'fa-sliders-h', label: 'Settings' }
      ];
      
      return (
        <div className="relative min-h-screen text-white">
          {/* Animated Background */}
          <div className="floating-bg">
            <div style={{ top: '10%', left: '20%', width: '300px', height: '300px', animationDelay: '0s' }}></div>
            <div style={{ top: '60%', left: '70%', width: '400px', height: '400px', animationDelay: '5s' }}></div>
            <div style={{ top: '30%', left: '80%', width: '250px', height: '250px', animationDelay: '2s' }}></div>
            <div style={{ top: '70%', left: '10%', width: '350px', height: '350px', animationDelay: '7s' }}></div>
          </div>
          
          <div className="flex flex-col md:flex-row relative z-10">
            {/* Desktop Sidebar */}
            <motion.aside 
              initial={{ x: -100, opacity: 0 }} 
              animate={{ x: 0, opacity: 1 }} 
              transition={{ duration: 0.5 }}
              className="hidden md:flex flex-col w-72 glass-premium m-4 rounded-3xl h-[96vh] sticky top-4 p-6 border border-white/10"
            >
              <div className="flex items-center gap-3 mb-10">
                <i className="fas fa-crown text-emerald-400 text-2xl"></i>
                <h1 className="text-2xl font-bold bg-gradient-to-r from-white to-emerald-300 bg-clip-text text-transparent">
                  Nexus Habit
                </h1>
              </div>
              
              <div className="flex-1 space-y-2">
                {navItems.map(item => (
                  <motion.button
                    key={item.id}
                    whileHover={{ x: 5 }}
                    whileTap={{ scale: 0.98 }}
                    onClick={() => setActiveSidebar(item.id)}
                    className={`w-full flex items-center gap-4 px-5 py-3 rounded-xl transition-all ${
                      activeSidebar === item.id 
                        ? 'bg-emerald-600/30 text-emerald-400 border-l-4 border-emerald-400' 
                        : 'hover:bg-white/5 text-gray-300'
                    }`}
                  >
                    <i className={`fas ${item.icon} w-5`}></i>
                    <span>{item.label}</span>
                  </motion.button>
                ))}
              </div>
              
              {/* XP & Level Card */}
              <div className="pt-6 border-t border-white/10 mt-4">
                <div className="bg-gradient-to-br from-emerald-900/40 to-emerald-800/20 p-4 rounded-2xl">
                  <div className="flex justify-between items-center mb-2">
                    <span className="text-sm">{levelInfo.icon} Level {levelInfo.level}</span>
                    <span className="text-sm font-semibold text-emerald-400">{xp} XP</span>
                  </div>
                  <div className="h-2 bg-gray-700 rounded-full overflow-hidden">
                    <motion.div 
                      className="bg-gradient-to-r from-emerald-400 to-emerald-300 h-full rounded-full"
                      initial={{ width: 0 }}
                      animate={{ width: `${levelInfo.next ? (xp / levelInfo.next) * 100 : 100}%` }}
                      transition={{ duration: 0.5 }}
                    ></motion.div>
                  </div>
                  <p className="text-xs text-gray-300 mt-2">{levelInfo.name}</p>
                </div>
              </div>
            </motion.aside>
            
            {/* Main Content Area */}
            <main className="flex-1 p-4 md:p-8 pb-24">
              <AnimatePresence mode="wait">
                <motion.div
                  key={activeSidebar}
                  initial={{ opacity: 0, y: 20 }}
                  animate={{ opacity: 1, y: 0 }}
                  exit={{ opacity: 0, y: -20 }}
                  transition={{ duration: 0.3 }}
                >
                  {activeSidebar === 'Dashboard' && (
                    <Dashboard 
                      habits={habits}
                      completionRate={completionRate}
                      xp={xp}
                      levelInfo={levelInfo}
                      aiMessage={aiMessage}
                      pomodoroSessions={pomodoroSessions}
                      heatmapData={heatmapData}
                      bestStreakOverall={bestStreakOverall}
                    />
                  )}
                  
                  {activeSidebar === 'Habits' && (
                    <HabitsView
                      habits={filteredHabits}
                      searchTerm={searchTerm}
                      setSearchTerm={setSearchTerm}
                      filterCategory={filterCategory}
                      setFilterCategory={setFilterCategory}
                      onComplete={completeHabit}
                      onDelete={deleteHabit}
                      onAdd={addHabit}
                      categories={['All', 'Fitness', 'Study', 'Health', 'Spiritual', 'Productivity', 'Finance']}
                    />
                  )}
                  
                  {activeSidebar === 'Analytics' && (
                    <Analytics 
                      habits={habits}
                      heatmapData={heatmapData}
                    />
                  )}
                  
                  {activeSidebar === 'Focus Mode' && (
                    <FocusMode
                      pomodoroSessions={pomodoroSessions}
                      setPomodoroSessions={setPomodoroSessions}
                      soundEnabled={soundEnabled}
                    />
                  )}
                  
                  {activeSidebar === 'Achievements' && (
                    <Achievements
                      xp={xp}
                      habits={habits}
                      pomodoroSessions={pomodoroSessions}
                      bestStreakOverall={bestStreakOverall}
                    />
                  )}
                  
                  {activeSidebar === 'Settings' && (
                    <Settings
                      notificationsEnabled={notificationsEnabled}
                      setNotificationsEnabled={setNotificationsEnabled}
                      soundEnabled={soundEnabled}
                      setSoundEnabled={setSoundEnabled}
                      onR
