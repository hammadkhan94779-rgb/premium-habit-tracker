<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Nexus Habit</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- React -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Font Awesome -->
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
  />

  <!-- Confetti -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

  <!-- Google Font -->
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet"
  />

  <style>
    * {
      font-family: "Inter", sans-serif;
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #050505;
      color: white;
      overflow-x: hidden;
    }

    .glass {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      backdrop-filter: blur(12px);
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }

    .gradient {
      background: linear-gradient(
        135deg,
        #10b981,
        #059669,
        #34d399
      );
    }

    .blob {
      position: fixed;
      border-radius: 999px;
      filter: blur(80px);
      opacity: 0.15;
      z-index: -1;
    }

    .blob1 {
      width: 300px;
      height: 300px;
      background: #10b981;
      top: 5%;
      left: 5%;
    }

    .blob2 {
      width: 350px;
      height: 350px;
      background: #059669;
      bottom: 5%;
      right: 5%;
    }

    button {
      cursor: pointer;
    }

    ::-webkit-scrollbar {
      width: 5px;
    }

    ::-webkit-scrollbar-thumb {
      background: #10b981;
      border-radius: 999px;
    }
  </style>
</head>

<body>

  <div class="blob blob1"></div>
  <div class="blob blob2"></div>

  <div id="root"></div>

  <script type="text/babel">

    const { useState, useEffect } = React;

    const TODAY = new Date().toISOString().slice(0,10);

    function getLevel(xp) {
      if (xp < 200) return { level: 1, title: "Beginner", max: 200 };
      if (xp < 600) return { level: 2, title: "Consistent", max: 600 };
      if (xp < 1200) return { level: 3, title: "Disciplined", max: 1200 };
      if (xp < 2500) return { level: 4, title: "Elite", max: 2500 };

      return { level: 5, title: "Master", max: 5000 };
    }

    function calculateStreak(history) {

      let streak = 0;

      let date = new Date();

      while (true) {

        const key = date.toISOString().slice(0,10);

        if (history[key]) {
          streak++;
        } else {
          break;
        }

        date.setDate(date.getDate() - 1);
      }

      return streak;
    }

    function StatCard({ title, value, icon }) {

      return (
        <div className="glass rounded-3xl p-5">

          <i className={`fas ${icon} text-emerald-400 text-2xl mb-4`}></i>

          <p className="text-gray-400 text-sm">
            {title}
          </p>

          <h2 className="text-3xl font-bold mt-2">
            {value}
          </h2>

        </div>
      );
    }

    function HabitCard({ habit, onComplete, onDelete }) {

      const completed = habit.history[TODAY];

      const streak = calculateStreak(habit.history);

      return (
        <div className="glass rounded-3xl p-5 hover:scale-[1.02] transition">

          <div className="flex justify-between items-start">

            <div>

              <div className="text-4xl mb-3">
                {habit.icon}
              </div>

              <h2 className="text-xl font-bold">
                {habit.name}
              </h2>

              <div className="flex gap-2 mt-3 flex-wrap">

                <span className="bg-emerald-500/20 text-emerald-400 px-3 py-1 rounded-full text-xs">
                  {habit.category}
                </span>

                <span className="bg-white/10 px-3 py-1 rounded-full text-xs">
                  {habit.priority}
                </span>

              </div>

            </div>

            <button
              onClick={() => onDelete(habit.id)}
              className="text-red-400"
            >
              <i className="fas fa-trash"></i>
            </button>

          </div>

          <div className="mt-6 flex justify-between items-center">

            <div>

              <p className="text-gray-400 text-sm">
                Streak
              </p>

              <h3 className="text-2xl font-bold text-emerald-400">
                🔥 {streak}
              </h3>

            </div>

            <button
              disabled={completed}
              onClick={() => onComplete(habit.id)}
              className={
                completed
                ? "bg-emerald-500 text-black px-5 py-3 rounded-2xl font-semibold"
                : "bg-white/10 hover:bg-white/20 px-5 py-3 rounded-2xl font-semibold transition"
              }
            >
              {completed ? "Done" : "Complete"}
            </button>

          </div>

        </div>
      );
    }

    function App() {

      const [habits, setHabits] = useState(() => {

        try {

          const saved = localStorage.getItem("nexus_habits");

          return saved
            ? JSON.parse(saved)
            : [
                {
                  id: 1,
                  name: "Workout",
                  icon: "💪",
                  category: "Fitness",
                  priority: "High",
                  history: {
                    [TODAY]: false
                  }
                },
                {
                  id: 2,
                  name: "Read Book",
                  icon: "📚",
                  category: "Study",
                  priority: "Medium",
                  history: {
                    [TODAY]: true
                  }
                }
              ];

        } catch {
          return [];
        }

      });

      const [xp, setXp] = useState(() => {
        return parseInt(localStorage.getItem("nexus_xp")) || 0;
      });

      const [showModal, setShowModal] = useState(false);

      const [newHabit, setNewHabit] = useState({
        name: "",
        icon: "⭐",
        category: "Productivity",
        priority: "Medium"
      });

      useEffect(() => {
        localStorage.setItem(
          "nexus_habits",
          JSON.stringify(habits)
        );
      }, [habits]);

      useEffect(() => {
        localStorage.setItem(
          "nexus_xp",
          xp
        );
      }, [xp]);

      const level = getLevel(xp);

      const completedToday = habits.filter(
        habit => habit.history[TODAY]
      ).length;

      const completionRate = habits.length
        ? Math.round((completedToday / habits.length) * 100)
        : 0;

      function addHabit() {

        if (!newHabit.name.trim()) return;

        const habit = {
          id: Date.now(),
          ...newHabit,
          history: {
            [TODAY]: false
          }
        };

        setHabits([...habits, habit]);

        setNewHabit({
          name: "",
          icon: "⭐",
          category: "Productivity",
          priority: "Medium"
        });

        setShowModal(false);
      }

      function completeHabit(id) {

        setHabits(prev =>
          prev.map(habit => {

            if (habit.id === id && !habit.history[TODAY]) {

              confetti({
                particleCount: 80,
                spread: 70
              });

              setXp(prevXp => prevXp + 15);

              return {
                ...habit,
                history: {
                  ...habit.history,
                  [TODAY]: true
                }
              };
            }

            return habit;
          })
        );
      }

      function deleteHabit(id) {
        setHabits(habits.filter(h => h.id !== id));
      }

      return (

        <div className="min-h-screen p-5 md:p-8">

          {/* Header */}

          <div className="glass rounded-3xl p-6 mb-8">

            <div className="flex flex-col md:flex-row md:items-center md:justify-between gap-5">

              <div>

                <h1 className="text-4xl font-black bg-gradient-to-r from-white to-emerald-400 bg-clip-text text-transparent">
                  Nexus Habit
                </h1>

                <p className="text-gray-400 mt-2">
                  Premium Productivity Tracker
                </p>

              </div>

              <button
                onClick={() => setShowModal(true)}
                className="gradient px-6 py-3 rounded-2xl font-semibold hover:scale-105 transition"
              >
                <i className="fas fa-plus mr-2"></i>
                New Habit
              </button>

            </div>

          </div>

          {/* Stats */}

          <div className="grid grid-cols-1 md:grid-cols-3 gap-5 mb-8">

            <StatCard
              title="Today's Progress"
              value={`${completionRate}%`}
              icon="fa-chart-line"
            />

            <StatCard
              title="XP"
              value={xp}
              icon="fa-star"
            />

            <StatCard
              title="Level"
              value={level.title}
              icon="fa-crown"
            />

          </div>

          {/* Progress */}

          <div className="glass rounded-3xl p-6 mb-8">

            <div className="flex justify-between mb-3">

              <span>
                Level {level.level}
              </span>

              <span>
                {xp} XP
              </span>

            </div>

            <div className="w-full h-4 bg-gray-800 rounded-full overflow-hidden">

              <div
                className="gradient h-full rounded-full transition-all duration-500"
                style={{
                  width: `${(xp / level.max) * 100}%`
                }}
              ></div>

            </div>

          </div>

          {/* Habit Cards */}

          <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5">

            {habits.map(habit => (
              <HabitCard
                key={habit.id}
                habit={habit}
                onComplete={completeHabit}
                onDelete={deleteHabit}
              />
            ))}

          </div>

          {/* Modal */}

          {
            showModal && (

              <div className="fixed inset-0 bg-black/70 flex items-center justify-center p-5 z-50">

                <div className="glass rounded-3xl p-6 w-full max-w-md">

                  <h2 className="text-2xl font-bold mb-5">
                    Create Habit
                  </h2>

                  <div className="space-y-4">

                    <input
                      type="text"
                      placeholder="Habit Name"
                      value={newHabit.name}
                      onChange={(e) =>
                        setNewHabit({
                          ...newHabit,
                          name: e.target.value
                        })
                      }
                      className="w-full bg-black/30 border border-white/10 rounded-2xl p-4 outline-none"
                    />

                    <input
                      type="text"
                      placeholder="Emoji"
                      maxLength="2"
                      value={newHabit.icon}
                      onChange={(e) =>
                        setNewHabit({
                          ...newHabit,
                          icon: e.target.value
                        })
                      }
                      className="w-full bg-black/30 border border-white/10 rounded-2xl p-4 outline-none"
                    />

                    <select
                      value={newHabit.category}
                      onChange={(e) =>
                        setNewHabit({
                          ...newHabit,
                          category: e.target.value
                        })
                      }
                      className="w-full bg-black/30 border border-white/10 rounded-2xl p-4 outline-none"
                    >
                      <option>Productivity</option>
                      <option>Fitness</option>
                      <option>Study</option>
                      <option>Mindfulness</option>
                    </select>

                    <select
                      value={newHabit.priority}
                      onChange={(e) =>
                        setNewHabit({
                          ...newHabit,
                          priority: e.target.value
                        })
                      }
                      className="w-full bg-black/30 border border-white/10 rounded-2xl p-4 outline-none"
                    >
                      <option>Low</option>
                      <option>Medium</option>
                      <option>High</option>
                    </select>

                  </div>

                  <div className="flex gap-3 mt-6">

                    <button
                      onClick={addHabit}
                      className="gradient flex-1 py-3 rounded-2xl font-semibold"
                    >
                      Add
                    </button>

                    <button
                      onClick={() => setShowModal(false)}
                      className="bg-white/10 flex-1 py-3 rounded-2xl"
                    >
                      Cancel
                    </button>

                  </div>

                </div>

              </div>
            )
          }

        </div>
      );
    }

    const root = ReactDOM.createRoot(
      document.getElementById("root")
    );

    root.render(<App />);

  </script>

</body>
 </html>
