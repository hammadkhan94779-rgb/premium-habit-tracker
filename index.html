PREMIUM HABIT TRACKER
FULL ADVANCED VERSION
Includes:
- Premium SaaS Dashboard
- Analytics
- Streak System
- Pomodoro Timer
- Achievements
- Glassmorphism UI
- Animated Sections
- LocalStorage Persistence
- Dark/Light Theme
- Responsive Design
-->
<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Premium Habit Tracker</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            premium: '#10B981',
            darkbg: '#121212',
            card: '#1E1E1E'
          }
        }
      }
    }
  </script>

  <style>
    body {
      background: #121212;
      color: white;
      font-family: Arial, sans-serif;
      overflow-x: hidden;
    }

    .glass {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .habit-card:hover {
      transform: translateY(-4px);
      transition: 0.3s ease;
    }
  </style>
</head>
<body>

<div id="root"></div>

<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel">

const { useState, useEffect } = React;

function App() {

  // =========================
  // STATES
  // =========================

  const [habitInput, setHabitInput] = useState('');
  const [darkMode, setDarkMode] = useState(true);
  const [quoteIndex, setQuoteIndex] = useState(0);
  const [focusTime, setFocusTime] = useState(25 * 60);
  const [isRunning, setIsRunning] = useState(false);
  const [sessionCount, setSessionCount] = useState(0);

  const quotes = [
    'Discipline creates freedom.',
    'Small habits create big results.',
    'Consistency beats motivation.',
    'Stay focused. Stay disciplined.',
    'Daily consistency builds greatness.'
  ];

  const [habits, setHabits] = useState(() => {
    const saved = localStorage.getItem('habits');
    return saved ? JSON.parse(saved) : [
      {
        id: 1,
        name: 'Morning Workout',
        streak: 4,
        completed: false
      },
      {
        id: 2,
        name: 'Read 30 Minutes',
        streak: 8,
        completed: false
      }
    ];
  });

  useEffect(() => {
    localStorage.setItem('habits', JSON.stringify(habits));
  }, [habits]);

  const addHabit = () => {
    if (!habitInput.trim()) return;

    const newHabit = {
      id: Date.now(),
      name: habitInput,
      streak: 0,
      completed: false
    };

    setHabits([...habits, newHabit]);
    setHabitInput('');
  };

  const toggleHabit = (id) => {
    const updated = habits.map(habit => {
      if (habit.id === id) {
        return {
          ...habit,
          completed: !habit.completed,
          streak: !habit.completed ? habit.streak + 1 : Math.max(habit.streak - 1, 0)
        };
      }
      return habit;
    });

    setHabits(updated);
  };

  const deleteHabit = (id) => {
    setHabits(habits.filter(h => h.id !== id));
  };

  const completedHabits = habits.filter(h => h.completed).length;
  const progress = habits.length ? Math.round((completedHabits / habits.length) * 100) : 0;

  useEffect(() => {
    const interval = setInterval(() => {
      setQuoteIndex(prev => (prev + 1) % quotes.length);
    }, 4000);

    return () => clearInterval(interval);
  }, []);

  useEffect(() => {
    let timer;

    if (isRunning && focusTime > 0) {
      timer = setInterval(() => {
        setFocusTime(prev => prev - 1);
      }, 1000);
    }

    if (focusTime === 0) {
      setIsRunning(false);
      setSessionCount(prev => prev + 1);
      alert('Pomodoro Session Completed');
    }

    return () => clearInterval(timer);
  }, [isRunning, focusTime]);

  const formatTime = (time) => {
    const minutes = Math.floor(time / 60);
    const seconds = time % 60;
    return `${minutes}:${seconds < 10 ? '0' : ''}${seconds}`;
  };

  return (
    <div className={`min-h-screen p-6 transition-all duration-500 ${darkMode ? 'bg-[#121212] text-white' : 'bg-gray-100 text-black'}`}>

      {/* Floating Glow Effects */}
      <div className="fixed top-0 left-0 w-72 h-72 bg-green-500/10 blur-3xl rounded-full"></div>
      <div className="fixed bottom-0 right-0 w-72 h-72 bg-emerald-400/10 blur-3xl rounded-full"></div>

      <div className="max-w-6xl mx-auto">

        <nav className="glass rounded-3xl p-5 mb-8 flex justify-between items-center sticky top-4 z-50">
          <h1 className="text-2xl font-bold">🔥 Premium Habit Tracker</h1>

          <button
            onClick={() => setDarkMode(!darkMode)}
            className="bg-green-500 px-4 py-2 rounded-xl font-bold"
          >
            {darkMode ? 'Light Mode' : 'Dark Mode'}
          </button>
        </nav>

        <section className="text-center mb-16 pt-10">
          <h1 className="text-6xl font-black mb-6 leading-tight">
            Stay Consistent.<br />
            Build Better Habits.
          </h1>

          <p className="text-gray-400 text-xl max-w-2xl mx-auto mb-8">
            Track your habits, improve discipline, and build long-term consistency.
          </p>

          <button className="bg-green-500 hover:scale-105 transition-all px-10 py-5 rounded-2xl text-xl font-bold shadow-2xl shadow-green-500/30">
            Start Tracking
          </button>
        </section>

        <div className="text-center mb-10">
          <h1 className="text-5xl font-bold mb-4">
            Premium Habit Tracker
          </h1>

          <p className="text-gray-400 text-lg">
            Build discipline. Track progress. Stay consistent.
          </p>
        </div>

        <div className="glass rounded-3xl p-6 mb-8">

          <div className="flex flex-col md:flex-row gap-4">

            <input
              type="text"
              placeholder="Add a new habit..."
              value={habitInput}
              onChange={(e) => setHabitInput(e.target.value)}
              className="flex-1 bg-[#1E1E1E] border border-gray-700 rounded-xl px-5 py-4 outline-none focus:border-green-500"
            />

            <button
              onClick={addHabit}
              className="bg-green-500 hover:bg-green-600 transition px-8 py-4 rounded-xl font-bold"
            >
              Add Habit
            </button>

          </div>

        </div>

        <section className="glass rounded-3xl p-8 mb-10 text-center">
          <h2 className="text-3xl font-bold mb-4">Daily Motivation</h2>

          <p className="text-2xl text-green-400 transition-all duration-500">
            “{quotes[quoteIndex]}”
          </p>
        </section>

        <div className="grid md:grid-cols-3 gap-6 mb-8">

          <div className="glass rounded-3xl p-6 text-center">
            <h2 className="text-gray-400 mb-2">Total Habits</h2>
            <p className="text-4xl font-bold">{habits.length}</p>
          </div>

          <div className="glass rounded-3xl p-6 text-center">
            <h2 className="text-gray-400 mb-2">Completed</h2>
            <p className="text-4xl font-bold text-green-400">{completedHabits}</p>
          </div>

          <div className="glass rounded-3xl p-6 text-center">
            <h2 className="text-gray-400 mb-2">Progress</h2>
            <p className="text-4xl font-bold text-green-400">{progress}%</p>
          </div>

        </div>

        <div className="glass rounded-3xl p-6 mb-8">

          <div className="w-full bg-gray-800 rounded-full h-5 overflow-hidden">
            <div
              className="bg-green-500 h-5 transition-all duration-500"
              style={{ width: `${progress}%` }}
            ></div>
          </div>

        </div>

        <section className="glass rounded-3xl p-8 mb-10">
          <div className="flex flex-col items-center justify-center">
            <h2 className="text-3xl font-bold mb-4">Pomodoro Focus Timer</h2>

            <div className="text-7xl font-black text-green-400 mb-6">
              {formatTime(focusTime)}
            </div>

            <div className="flex gap-4 mb-6">
              <button
                onClick={() => setIsRunning(true)}
                className="bg-green-500 px-6 py-3 rounded-xl font-bold"
              >
                Start
              </button>

              <button
                onClick={() => setIsRunning(false)}
                className="bg-yellow-500 px-6 py-3 rounded-xl font-bold"
              >
                Pause
              </button>

              <button
                onClick={() => {
                  setFocusTime(25 * 60);
                  setIsRunning(false);
                }}
                className="bg-red-500 px-6 py-3 rounded-xl font-bold"
              >
                Reset
              </button>
            </div>

            <p className="text-gray-400">
              Sessions Completed: {sessionCount}
            </p>
          </div>
        </section>

        <section className="glass rounded-3xl p-8 mb-10">
          <h2 className="text-3xl font-bold mb-6">Achievements</h2>

          <div className="grid md:grid-cols-4 gap-6">

            <div className="bg-green-500/10 border border-green-500/20 rounded-2xl p-6 text-center">
              <div className="text-5xl mb-3">🏆</div>
              <h3 className="font-bold text-xl">7 Day Streak</h3>
            </div>

            <div className="bg-yellow-500/10 border border-yellow-500/20 rounded-2xl p-6 text-center">
              <div className="text-5xl mb-3">🔥</div>
              <h3 className="font-bold text-xl">Consistency Master</h3>
            </div>

            <div className="bg-blue-500/10 border border-blue-500/20 rounded-2xl p-6 text-center">
              <div className="text-5xl mb-3">🎯</div>
              <h3 className="font-bold text-xl">Focus Champion</h3>
            </div>

            <div className="bg-purple-500/10 border border-purple-500/20 rounded-2xl p-6 text-center">
              <div className="text-5xl mb-3">⭐</div>
              <h3 className="font-bold text-xl">Habit Legend</h3>
            </div>

          </div>
        </section>

        <div className="grid md:grid-cols-2 lg:grid-cols-3 gap-6">

          {habits.map(habit => (

            <div
              key={habit.id}
              className="habit-card glass rounded-3xl p-6"
            >

              <div className="flex justify-between items-start mb-5">

                <div>
                  <h3 className="text-2xl font-bold mb-2">
                    {habit.name}
                  </h3>

                  <p className="text-gray-400">
                    🔥 Streak: {habit.streak} days
                  </p>
                </div>

                <button
                  onClick={() => deleteHabit(habit.id)}
                  className="text-red-400 hover:text-red-500 text-xl"
                >
                  ×
                </button>

              </div>

              <button
                onClick={() => toggleHabit(habit.id)}
                className={`w-full py-4 rounded-xl font-bold transition ${habit.completed
                  ? 'bg-green-500 text-white'
                  : 'bg-gray-800 hover:bg-gray-700'
                }`}
              >
                {habit.completed ? 'Completed Today ✓' : 'Mark Complete'}
              </button>

            </div>

          ))}

        </div>

        <div className="mt-12 text-center text-gray-500">
          Made with React + Tailwind CSS
        </div>

      </div>

    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);

</script>

</body>
</html>
