 <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  />
  <title>Nexus Habit | Premium Habit Tracker</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- React -->
  <script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.development.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.development.js"></script>

  <!-- Framer Motion -->
  <script src="https://cdn.jsdelivr.net/npm/framer-motion@10.16.4/dist/framer-motion.js"></script>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- Confetti -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

  <!-- Font Awesome -->
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
  />

  <!-- Google Font -->
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet"
  />

  <style>
    * {
      font-family: "Inter", sans-serif;
    }

    body {
      margin: 0;
      background: #050505;
      color: white;
      overflow-x: hidden;
    }

    .glass {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }

    .gradient {
      background: linear-gradient(
        135deg,
        #10b981,
        #059669,
        #34d399
      );
    }

    .floating-bg {
      position: fixed;
      inset: 0;
      overflow: hidden;
      z-index: -1;
    }

    .blob {
      position: absolute;
      border-radius: 9999px;
      filter: blur(80px);
      opacity: 0.18;
      animation: float 15s infinite ease-in-out;
    }

    .blob1 {
      width: 300px;
      height: 300px;
      background: #10b981;
      top: 10%;
      left: 5%;
    }

    .blob2 {
      width: 350px;
      height: 350px;
      background: #059669;
      right: 5%;
      bottom: 10%;
      animation-delay: 3s;
    }

    @keyframes float {
      0% {
        transform: translateY(0px);
      }
      50% {
        transform: translateY(-25px);
      }
      100% {
        transform: translateY(0px);
      }
    }

    ::-webkit-scrollbar {
      width: 5px;
    }

    ::-webkit-scrollbar-thumb {
      background: #10b981;
      border-radius: 9999px;
    }
  </style>
</head>

<body>
  <div class="floating-bg">
    <div class="blob blob1"></div>
    <div class="blob blob2"></div>
  </div>

  <div id="root"></div>

  <script type="text/babel">

    const { useState, useEffect, useRef } = React;
    const { motion, AnimatePresence } = window.framerMotion;

    const TODAY = new Date().toISOString().slice(0, 10);

    // ---------------------------------------------
    // Helpers
    // ---------------------------------------------

    const getLevel = (xp) => {
      if (xp < 200) return { level: 1, name: "Beginner", max: 200 };
      if (xp < 600) return { level: 2, name: "Consistent", max: 600 };
      if (xp < 1500) return { level: 3, name: "Disciplined", max: 1500 };
      if (xp < 3500) return { level: 4, name: "Elite", max: 3500 };
      return { level: 5, name: "Master", max: 5000 };
    };

    const calculateStreak = (history) => {
      let streak = 0;
      let date = new Date();

      while (true) {
        const key = date.toISOString().slice(0, 10);

        if (history[key]) {
          streak++;
        } else {
          break;
        }

        date.setDate(date.getDate() - 1);
      }

      return streak;
    };

    // ---------------------------------------------
    // App
    // ---------------------------------------------

    function App() {

      const [habits, setHabits] = useState(() => {
        try {
          const saved = localStorage.getItem("nexus_habits");
          return saved
            ? JSON.parse(saved)
            : [
                {
                  id: 1,
                  name: "Morning Meditation",
                  icon: "🧘",
                  category: "Mindfulness",
                  priority: "High",
                  history: {
                    [TODAY]: false,
                  },
                },
                {
                  id: 2,
                  name: "Workout",
                  icon: "💪",
                  category: "Fitness",
                  priority: "High",
                  history: {
                    [TODAY]: true,
                  },
                },
              ];
        } catch {
          return [];
        }
      });

      const [xp, setXp] = useState(() => {
        return parseInt(localStorage.getItem("nexus_xp")) || 0;
      });

      const [showModal, setShowModal] = useState(false);

      const [newHabit, setNewHabit] = useState({
        name: "",
        icon: "⭐",
        category: "Productivity",
        priority: "Medium",
      });

      useEffect(() => {
        localStorage.setItem("nexus_habits", JSON.stringify(habits));
      }, [habits]);

      useEffect(() => {
        localStorage.setItem("nexus_xp", xp);
      }, [xp]);

      const level = getLevel(xp);

      const completedToday = habits.filter(
        (h) => h.history[TODAY]
      ).length;

      const completionRate = habits.length
        ? Math.round((completedToday / habits.length) * 100)
        : 0;

      const addHabit = () => {

        if (!newHabit.name.trim()) return;

        const habit = {
          id: Date.now(),
          ...newHabit,
          history: {
            [TODAY]: false,
          },
        };

        setHabits([...habits, habit]);

        setNewHabit({
          name: "",
          icon: "⭐",
          category: "Productivity",
          priority: "Medium",
        });

        setShowModal(false);
      };

      const completeHabit = (id) => {

        setHabits((prev) =>
          prev.map((habit) => {

            if (habit.id === id && !habit.history[TODAY]) {

              window.confetti({
                particleCount: 100,
                spread: 70,
                origin: { y: 0.6 },
              });

              setXp((x) => x + 15);

              return {
                ...habit,
                history: {
                  ...habit.history,
                  [TODAY]: true,
                },
              };
            }

            return habit;
          })
        );
      };

      const deleteHabit = (id) => {
        setHabits(habits.filter((h) => h.id !== id));
      };

      return (
        <div className="min-h-screen p-5 md:p-8">

          {/* Header */}

          <motion.div
            initial={{ opacity: 0, y: -20 }}
            animate={{ opacity: 1, y: 0 }}
            className="glass rounded-3xl p-6 mb-8"
          >

            <div className="flex flex-col md:flex-row md:items-center md:justify-between gap-5">

              <div>
                <h1 className="text-4xl font-black bg-gradient-to-r from-white to-emerald-400 bg-clip-text text-transparent">
                  Nexus Habit
                </h1>

                <p className="text-gray-400 mt-2">
                  Premium Productivity System
                </p>
              </div>

              <button
                onClick={() => setShowModal(true)}
                className="gradient px-6 py-3 rounded-2xl font-semibold hover:scale-105 transition"
              >
                <i className="fas fa-plus mr-2"></i>
                New Habit
              </button>
            </div>
          </motion.div>

          {/* Stats */}

          <div className="grid grid-cols-1 md:grid-cols-3 gap-5 mb-8">

            <StatCard
              title="Today's Progress"
              value={`${completionRate}%`}
              icon="fa-chart-line"
            />

            <StatCard
              title="Total XP"
              value={xp}
              icon="fa-star"
            />

            <StatCard
              title="Level"
              value={level.name}
              icon="fa-crown"
            />

          </div>

          {/* Progress */}

          <div className="glass rounded-3xl p-6 mb-8">

            <div className="flex justify-between mb-3">
              <span>Level {level.level}</span>
              <span>{xp} XP</span>
            </div>

            <div className="w-full h-4 bg-gray-800 rounded-full overflow-hidden">
              <div
                className="gradient h-full rounded-full transition-all duration-500"
                style={{
                  width: `${(xp / level.max) * 100}%`,
                }}
              ></div>
            </div>

          </div>

          {/* Habits */}

          <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5">

            {habits.map((habit) => {

              const completed = habit.history[TODAY];
              const streak = calculateStreak(habit.history);

              return (
                <motion.div
                  key={habit.id}
                  whileHover={{ y: -5 }}
                  className="glass rounded-3xl p-5"
                >

                  <div className="flex justify-between items-start">

                    <div>
                      <div className="text-4xl mb-3">
                        {habit.icon}
                      </div>

                      <h2 className="text-xl font-bold">
                        {habit.name}
                      </h2>

                      <div className="flex gap-2 mt-2 flex-wrap">

                        <span className="bg-emerald-500/20 text-emerald-400 px-3 py-1 rounded-full text-xs">
                          {habit.category}
                        </span>

                        <span className="bg-white/10 px-3 py-1 rounded-full text-xs">
                          {habit.priority}
                        </span>

                      </div>
                    </div>

                    <button
                      onClick={() => deleteHabit(habit.id)}
                      className="text-red-400 hover:text-red-500"
                    >
                      <i className="fas fa-trash"></i>
                    </button>
                  </div>

                  <div className="mt-5 flex justify-between items-center">

                    <div>
                      <p className="text-gray-400 text-sm">
                        Current Streak
                      </p>

                      <p className="text-2xl font-bold text-emerald-400">
                        🔥 {streak}
                      </p>
                    </div>

                    <button
                      disabled={completed}
                      onClick={() => completeHabit(habit.id)}
                      className={`px-5 py-3 rounded-2xl font-semibold transition ${
                        completed
                          ? "bg-emerald-500 text-black"
                          : "bg-white/10 hover:bg-white/20"
                      }`}
                    >
                      {completed ? "Completed" : "Complete"}
                    </button>

                  </div>

                </motion.div>
              );
            })}
          </div>

          {/* Modal */}

          <AnimatePresence>

            {showModal && (

              <motion.div
                initial={{ opacity: 0 }}
                animate={{ opacity: 1 }}
                exit={{ opacity: 0 }}
                className="fixed inset-0 bg-black/70 flex items-center justify-center p-5 z-50"
              >

                <motion.div
                  initial={{ scale: 0.8 }}
                  animate={{ scale: 1 }}
                  exit={{ scale: 0.8 }}
                  className="glass rounded-3xl p-6 w-full max-w-md"
                >

                  <h2 className="text-2xl font-bold mb-5">
                    Create New Habit
                  </h2>

                  <div className="space-y-4">

                    <input
                      type="text"
                      placeholder="Habit Name"
                      value={newHabit.name}
                      onChange={(e) =>
                        setNewHabit({
                          ...newHabit,
                          name: e.target.value,
                        })
                      }
                      className="w-full bg-black/30 border border-white/10 rounded-2xl p-4 outline-none"
                    />

                    <input
                      type="text"
                      placeholder="Emoji"
                      maxLength="2"
                      value={newHabit.icon}
                      onChange={(e) =>
                        setNewHabit({
                          ...newHabit,
                          icon: e.target.value,
                        })
                      }
                      className="w-full bg-black/30 border border-white/10 rounded-2xl p-4 outline-none"
                    />

                    <select
                      value={newHabit.category}
                      onChange={(e) =>
                        setNewHabit({
                          ...newHabit,
                          category: e.target.value,
                        })
                      }
                      className="w-full bg-black/30 border border-white/10 rounded-2xl p-4 outline-none"
                    >
                      <option>Productivity</option>
                      <option>Fitness</option>
                      <option>Mindfulness</option>
                      <option>Study</option>
                      <option>Finance</option>
                    </select>

                    <select
                      value={newHabit.priority}
                      onChange={(e) =>
                        setNewHabit({
                          ...newHabit,
                          priority: e.target.value,
                        })
                      }
                      className="w-full bg-black/30 border border-white/10 rounded-2xl p-4 outline-none"
                    >
                      <option>Low</option>
                      <option>Medium</option>
                      <option>High</option>
                    </select>

                  </div>

                  <div className="flex gap-3 mt-6">

                    <button
                      onClick={addHabit}
                      className="gradient flex-1 py-3 rounded-2xl font-semibold"
                    >
                      Add Habit
                    </button>

                    <button
                      onClick={() => setShowModal(false)}
                      className="bg-white/10 flex-1 py-3 rounded-2xl"
                    >
                      Cancel
                    </button>

                  </div>

                </motion.div>
              </motion.div>
            )}

          </AnimatePresence>

        </div>
      );
    }

    // ---------------------------------------------
    // Stat Card
    // ---------------------------------------------

    function StatCard({ title, value, icon }) {
      return (
        <motion.div
          whileHover={{ scale: 1.03 }}
          className="glass rounded-3xl p-5"
        >

          <i className={`fas ${icon} text-emerald-400 text-2xl mb-4`}></i>

          <p className="text-gray-400 text-sm">
            {title}
          </p>

          <h2 className="text-3xl font-bold mt-2">
            {value}
          </h2>

        </motion.div>
      );
    }

    // ---------------------------------------------
    // Render
    // ---------------------------------------------

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);

  </script>
</body>
     </html>
