<head>

    <script>

    <style>
        :root {
            --bg: #121212;
            --text: #F5F5F5;
            --card: #1E1E1E;
            --accent: #10B981;
            --gray: #8B8B8B;
            --border: rgba(255, 255, 255, 0.06);
        }

        .light {
            --bg: #F8FAFC;
            --text: #1a1a1a;
            --card: #FFFFFF;
            --accent: #059669;
            --gray: #64748B;
            --border: rgba(0, 0, 0, 0.08);
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            transition: background-color 0.4s ease, color 0.4s ease;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            scroll-behavior: smooth;
            overflow-x: hidden;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(139, 139, 139, 0.4);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(139, 139, 139, 0.7);
        }

        /* Glassmorphism */
        .glass {
            background: rgba(30, 30, 30, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
        }
        .light .glass {
            background: rgba(255, 255, 255, 0.7);
            border: 1px solid rgba(0, 0, 0, 0.06);
        }

        /* Premium card hover */
        .premium-card {
            transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }
        .premium-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg,
                    transparent,
                    rgba(255, 255, 255, 0.03),
                    transparent);
            transition: left 0.6s ease;
            z-index: 1;
        }
        .premium-card:hover::before {
            left: 100%;
        }
        .premium-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
        }
        .light .premium-card:hover {
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.1);
        }

        /* Circular progress */
        .circular-progress {
            transition: stroke-dashoffset 0.5s ease;
        }

        /* Animated gradient border */
        .gradient-border {
            position: relative;
            border-radius: 20px;
        }
        .gradient-border::after {
            content: '';
            position: absolute;
            inset: -1px;
            border-radius: 21px;
            padding: 1px;
            background: linear-gradient(135deg, #10B981, #34D399, #10B981);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            opacity: 0;
            transition: opacity 0.4s ease;
            z-index: 0;
        }
        .gradient-border:hover::after {
            opacity: 1;
        }

        /* Skeleton loader */
        .skeleton {
            background: linear-gradient(90deg,
                    rgba(255, 255, 255, 0.04) 25%,
                    rgba(255, 255, 255, 0.08) 50%,
                    rgba(255, 255, 255, 0.04) 75%);
            background-size: 200% 100%;
            animation: shimmer 2s linear infinite;
            border-radius: 8px;
        }

        /* Floating glow orb */
        .glow-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            pointer-events: none;
            z-index: 0;
            opacity: 0.15;
            transition: opacity 0.5s ease;
        }
        .light .glow-orb {
            opacity: 0.08;
        }

        /* Pulse ring for timer */
        .pulse-ring {
            animation: pulseRing 2s ease-out infinite;
        }
        @keyframes pulseRing {
            0% {
                transform: scale(1);
                opacity: 0.6;
            }
            100% {
                transform: scale(1.5);
                opacity: 0;
            }
        }

        /* Achievement badge */
        .badge-glow {
            box-shadow: 0 0 25px rgba(16, 185, 129, 0.3);
        }
        .badge-locked {
            filter: grayscale(1);
            opacity: 0.5;
        }

        /* Responsive font scaling */
        @media (max-width: 640px) {
            .hero-title {
                font-size: 2rem;
                line-height: 1.2;
            }
            .hero-subtitle {
                font-size: 1rem;
            }
        }
        @media (min-width: 641px) and (max-width: 1024px) {
            .hero-title {
                font-size: 2.8rem;
            }
        }
        @media (min-width: 1025px) {
            .hero-title {
                font-size: 3.8rem;
            }
        }
    </style>
</head>
<body class="min-h-screen antialiased">

    <script type="text/babel">

        // ==================== CONTEXT ====================

        // ==================== UTILS ====================

        const loadData = () => {
            try {
                const saved = localStorage.getItem(STORAGE_KEY);
                if (saved) {
                    const parsed = JSON.parse(saved);
                    return { ...defaultData, ...parsed, habits: parsed.habits || defaultData.habits };

                console.warn('Failed to load data, using defaults');

            return { ...defaultData };

        const saveData = (data) => {
            try {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
            } catch (e) {

            Productivity: { bg: 'bg-amber-500/20', text: 'text-amber-400', border: 'border-amber-500/30' },

        const emojiOptions = ['🧘', '📚', '💪', '💧', '🏃', '🎯', '✍️', '🧠', '🌱', '💤', '🥗', '🚶', '🎵', '🙏', '💻', '📝'];

        // ==================== HOOKS ====================
        const useLocalStorage = (key, initialValue) => {
            const [storedValue, setStoredValue] = useState(() => {
                try {
                    const item = localStorage.getItem(key);
                    return item ? JSON.parse(item) : initialValue;
                } catch (e) {
                    return initialValue;
                }
            });

            const setValue = useCallback((value) => {
                const valueToStore = value instanceof Function ? value(storedValue) : value;
                setStoredValue(valueToStore);
                localStorage.setItem(key, JSON.stringify(valueToStore));
            }, [key, storedValue]);

            return [storedValue, setValue];
        };

        // ==================== COMPONENTS ====================

        // Loading Screen
        const LoadingScreen = ({ onComplete }) => {
            const [progress, setProgress] = useState(0);

            useEffect(() => {
                const interval = setInterval(() => {
                    setProgress(p => {
                        if (p >= 100) {
                            clearInterval(interval);
                            setTimeout(onComplete, 300);
                            return 100;
                        }
                        return p + Math.random() * 15 + 2;
                    });
                }, 80);
                return () => clearInterval(interval);
            }, [onComplete]);

            return (
                <div className="fixed inset-0 z-50 flex flex-col items-center justify-center bg-matte-black dark:bg-matte-black light:bg-gray-50 transition-colors duration-500">

                        ></div>
                    </div>
                    <span className="text-xs text-gray-mid mt-3">{Math.round(Math.min(progress, 100))}%</span>

                >
                    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">

                            >

                                    <span className="text-lg">🔥</span>
                                </div>
                                <span className="font-display font-bold text-base md:text-lg text-soft-white dark:text-soft-white light:text-gray-900 tracking-tight">
                                    Premium<span class
